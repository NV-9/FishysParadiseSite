{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
        <title>Fishy's Paradise</title>

        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        <link rel="apple-touch-icon" sizes="180x180" href="{% static '/apple-touch-icon.png' %}">
        <link rel="icon" type="image/png" sizes="32x32" href="{% static '/favicon-32x32.png' %}">
        <link rel="icon" type="image/png" sizes="16x16" href="{% static '/favicon-16x16.png' %}">
        <link rel="manifest" href="{% static '/site.webmanifest' %}">

        <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet" />

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
        
        
    </head>
    <body style="background-color: aquamarine;">
        <nav class="navbar navbar-dark bg-dark">
            <a class="flex-sm-fill text-sm-center nav-link {% block navhome %}{% endblock %}" style="color:aquamarine;" href="/">Home</a>
            <a class="flex-sm-fill text-sm-center nav-link {% block navdash %}{% endblock %}" style="color:aquamarine;" href="/dashboard">Dashboard</a>
            <a class="flex-sm-fill text-sm-center nav-link {% if not request.user.is_authenticated %} disabled {% endif %}" style="color:aquamarine;" href="/logout" tabindex="-1" aria-disabled="true">Logout</a>
        </nav>
        {% block content %}
        {% endblock content %}
    </body>
    <footer>

    </footer>
</html>
